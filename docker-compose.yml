services:
  # Il nostro database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: demodb
    ports:
      - "5432:5432"

  # La nostra applicazione Java
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Diciamo a Spring come connettersi al database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/demodb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - db